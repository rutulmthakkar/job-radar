name: weekly-discovery
on:
  schedule:
    - cron: '0 11 * * 1'   # Mondays 11:00 UTC
  workflow_dispatch:

permissions:
  contents: write

jobs:
  discover:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.11' }
      - run: pip install -r requirements.txt
      - name: Discover ATS slugs (slow)
        run: python -m fetchers.discover
      - name: Commit discovered slugs
        run: |
          git config user.name  "job-radar-bot"
          git config user.email "bot@users.noreply.github.com"
          git add data/discovered_slugs.json
          git diff --cached --quiet || git commit -m "discover: refresh ATS slugs $(date -u +%F)"
          git push
